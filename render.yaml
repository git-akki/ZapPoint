# Render blueprint — defines the backend Web Service in code so the deploy
# is reproducible. After pushing to GitHub, Render's "New from Blueprint"
# flow will read this file and provision the service automatically.
#
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: zappoint-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    branch: master
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      # Set these in the Render dashboard after the first deploy. They are
      # marked `sync: false` so Render won't try to commit dummy values.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: NODE_ENV
        value: production
